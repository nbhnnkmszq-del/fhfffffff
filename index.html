    <style>
        :root { --neon: #00ff88; --sky: #00ccff; --bg: #000; --card: #0a0a0a; --border: #1a1a1a; --glow: rgba(0, 255, 136, 0.4); }
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
        body{background: var(--bg); color:#fff; font-family:'Cairo',sans-serif; overflow-x:hidden;}

        .header { text-align: center; padding: 60px 0 30px; }
        .logo { font-family: 'Orbitron'; font-size: 38px; font-weight: 900; background: linear-gradient(to left, var(--neon), var(--sky)); -webkit-background-clip: text; color: transparent; letter-spacing: 4px; text-shadow: 0 0 30px var(--glow); }
        .ver-label { font-size: 10px; color: var(--neon); border: 1px solid var(--neon); padding: 2px 10px; border-radius: 5px; margin-top: 10px; display: inline-block; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 30px; padding: 25px; margin-bottom: 25px; position: relative; transition: 0.3s; }
        .card:hover { border-color: var(--neon); box-shadow: 0 0 20px rgba(0,255,136,0.1); }
        .card-title { font-family: 'Orbitron'; color: var(--neon); margin-bottom: 20px; display: flex; align-items: center; gap: 12px; font-size: 14px; font-weight: 900; }
        .btn-root { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 18px; background: var(--neon); color: #000; text-decoration: none; border-radius: 20px; font-weight: 900; font-size: 16px; box-shadow: 0 10px 20px rgba(0,255,136,0.2); }
        .app-row { display: flex; align-items: center; background: #0f0f0f; padding: 15px; border-radius: 22px; margin-bottom: 15px; border: 1px solid #1a1a1a; }
        .app-info { flex: 1; text-align: right; margin-right: 15px; }
        .name-txt { font-weight: 900; font-size: 17px; display: block; }
        .btn-install { background: #fff; color: #000; padding: 10px 22px; border-radius: 14px; text-decoration: none; font-weight: 900; font-size: 12px; font-family: 'Orbitron'; }
        .icon-box { width: 60px; height: 60px; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-family: 'Orbitron'; font-weight: 900; font-size: 28px; }
        .icon-e { background: #111; color: var(--neon); border: 1px solid var(--neon); }
        .icon-b { background: #fffc00; color: #000; font-size: 32px; }
        #loader { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column; }
